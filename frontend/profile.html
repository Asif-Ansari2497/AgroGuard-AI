<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile — AgroGuard AI</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .profile-container {
      max-width: 550px;
      margin: 1.5rem auto;
      padding: 0 1rem;
    }
    
    .profile-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 1.5rem;
    }
    
    .avatar-section {
      text-align: center;
      margin-bottom: 1rem;
      position: relative;
    }
    
    .avatar-wrapper {
      position: relative;
      display: inline-block;
    }
    
    .avatar {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      border: 3px solid var(--leaf);
      object-fit: cover;
      background: var(--surface2);
    }
    
    .avatar-upload-btn {
      position: absolute;
      bottom: 5px;
      right: 5px;
      background: var(--leaf);
      border: none;
      border-radius: 50%;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: white;
      font-size: 0.7rem;
    }
    
    .profile-name {
      font-size: 1.4rem;
      font-weight: 700;
      text-align: center;
      margin-top: 0.75rem;
    }
    
    .profile-email {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.8rem;
      margin-top: 0.25rem;
    }
    
    .profile-level {
      display: block;
      text-align: center;
      background: rgba(106, 173, 61, 0.15);
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
      font-size: 0.7rem;
      width: fit-content;
      margin: 0.5rem auto 0;
    }
    
    .weather-card {
      background: linear-gradient(135deg, #1a2a1a, #0f1a0f);
      border-radius: 20px;
      padding: 1rem;
      margin: 1.5rem 0;
      border: 1px solid rgba(106, 173, 61, 0.3);
    }
    
    .weather-location {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }
    
    .weather-main {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .weather-temp {
      font-size: 2.5rem;
      font-weight: 700;
    }
    
    .weather-icon {
      font-size: 2rem;
    }
    
    .weather-details {
      display: flex;
      justify-content: space-between;
      margin-top: 0.75rem;
      padding-top: 0.75rem;
      border-top: 1px solid rgba(106, 173, 61, 0.2);
      font-size: 0.75rem;
    }
    
    .risk-badge {
      margin-top: 0.75rem;
      padding: 0.5rem;
      border-radius: 12px;
      text-align: center;
      font-size: 0.7rem;
    }
    
    .risk-low { background: rgba(34, 197, 94, 0.15); color: #22c55e; border: 1px solid rgba(34, 197, 94, 0.3); }
    .risk-medium { background: rgba(245, 158, 11, 0.15); color: #f59e0b; border: 1px solid rgba(245, 158, 11, 0.3); }
    .risk-high { background: rgba(220, 38, 38, 0.15); color: #ef4444; border: 1px solid rgba(220, 38, 38, 0.3); }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.75rem;
      margin: 1rem 0;
    }
    
    .stat-box {
      background: var(--surface2);
      padding: 0.75rem;
      border-radius: 16px;
      text-align: center;
    }
    
    .stat-number {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--leaf);
    }
    
    .stat-label {
      font-size: 0.65rem;
      color: var(--text-muted);
      margin-top: 0.25rem;
    }
    
    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--border);
    }
    
    .info-label {
      color: var(--text-muted);
      font-size: 0.8rem;
    }
    
    .info-value {
      font-weight: 500;
      font-size: 0.85rem;
    }
    
    .action-buttons {
      display: flex;
      gap: 0.75rem;
      margin-top: 1rem;
    }
    
    .action-buttons button, .action-buttons a {
      flex: 1;
      text-align: center;
      padding: 0.6rem;
      border-radius: 12px;
      font-size: 0.8rem;
      text-decoration: none;
      cursor: pointer;
      border: none;
    }
    
    .edit-form {
      display: none;
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }
    
    .edit-form input {
      width: 100%;
      padding: 0.6rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 0.75rem;
      color: var(--text);
    }
    
    .voice-btn {
      background: var(--leaf);
      border: none;
      border-radius: 30px;
      padding: 6px 14px;
      color: var(--void);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
    }
    
    .btn-danger {
      background: #dc2626;
      color: white;
    }
    .btn-danger:hover {
      background: #b91c1c;
    }

    .weather-icon-sunny { color: #fbbf24; }
    .weather-icon-cloudy { color: #9ca3af; }
    .weather-icon-rainy { color: #60a5fa; }
    .weather-icon-snowy { color: #e5e7eb; }
  </style>
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="nav-brand"><div class="leaf-icon">🌿</div>AgroGuard AI</a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="dashboard.html">Dashboard</a></li>
    <li><a href="map.html">Disease Map</a></li>
  </ul>
  <div class="nav-right">
    <select id="langSelect" class="lang-select">
      <option value="en">🇬🇧 English</option>
      <option value="hi">🇮🇳 हिन्दी</option>
      <option value="pa">🌾 ਪੰਜਾਬੀ</option>
    </select>
    <button id="voiceBtn" class="voice-btn"><i class="fa fa-microphone"></i> Speak</button>
    <div id="navUserChip" class="user-chip" onclick="window.location.href='profile.html'" style="cursor:pointer;">
      <div id="navAvatar" class="user-avatar">U</div>
      <span id="navUserName">User</span>
      <button id="navLogoutBtn" class="btn btn-ghost btn-sm" onclick="event.stopPropagation(); localStorage.clear(); window.location.href='/';" style="margin-left:4px;">Logout</button>
    </div>
  </div>
</nav>

<div class="profile-container">
  <div class="profile-card">
    
    <!-- Avatar Section -->
    <div class="avatar-section">
      <div class="avatar-wrapper">
        <img id="profileAvatar" class="avatar" src="https://ui-avatars.com/api/?name=User&background=4caf50&color=fff&size=128" alt="Avatar">
        <button id="uploadAvatarBtn" class="avatar-upload-btn" title="Change Photo">
          <i class="fa fa-camera"></i>
        </button>
      </div>
      <input type="file" id="avatarInput" accept="image/*" style="display: none;">
      <h2 id="profileName" class="profile-name">Loading...</h2>
      <p id="profileEmail" class="profile-email">loading@example.com</p>
      <span id="profileLevel" class="profile-level">🌱 Level 1 — Seedling</span>
    </div>
    
    <!-- Weather Card -->
    <div class="weather-card">
      <div class="weather-location" id="weatherLocation">📍 Loading location...</div>
      <div class="weather-main">
        <div class="weather-temp" id="weatherTemp">--°C</div>
        <div class="weather-icon" id="weatherIcon">☁️</div>
      </div>
      <div class="weather-details">
        <span><i class="fa fa-tint"></i> <span id="weatherHumidity">--%</span></span>
        <span><i class="fa fa-wind"></i> <span id="weatherWind">-- km/h</span></span>
        <span><i class="fa fa-thermometer-half"></i> Feels <span id="weatherFeels">--°C</span></span>
      </div>
      <div id="diseaseRisk" class="risk-badge risk-medium">⚠️ Disease Risk: Medium</div>
    </div>
    
    <!-- Stats Grid -->
    <div class="stats-grid">
      <div class="stat-box">
        <div class="stat-number" id="statScans">0</div>
        <div class="stat-label">TOTAL SCANS</div>
      </div>
      <div class="stat-box">
        <div class="stat-number" id="statMostDisease">—</div>
        <div class="stat-label">MOST DETECTED</div>
      </div>
      <div class="stat-box">
        <div class="stat-number" id="statPoints">0</div>
        <div class="stat-label">POINTS EARNED</div>
      </div>
      <div class="stat-box">
        <div class="stat-number" id="statStreak">0</div>
        <div class="stat-label">DAY STREAK</div>
      </div>
    </div>
    
    <!-- Info Rows -->
    <div class="info-row">
      <span class="info-label"><i class="fa fa-map-marker-alt"></i> LOCATION</span>
      <span class="info-value" id="profileLocation">Not set</span>
    </div>
    
    <div class="info-row">
      <span class="info-label"><i class="fa fa-calendar"></i> MEMBER SINCE</span>
      <span class="info-value" id="profileMemberSince">—</span>
    </div>
    
    <!-- Edit Form -->
    <div id="editForm" class="edit-form">
      <input type="text" id="editNameInput" placeholder="Your Name">
      <div style="display: flex; gap: 0.5rem;">
        <button id="saveProfileBtn" class="btn btn-primary btn-sm" style="flex:1;">Save</button>
        <button id="cancelProfileBtn" class="btn btn-secondary btn-sm" style="flex:1;">Cancel</button>
      </div>
    </div>
    
    <!-- Action Buttons -->
    <div class="action-buttons">
      <button id="editProfileBtn" class="btn btn-primary"><i class="fa fa-user-edit"></i> Edit</button>
      <a href="dashboard.html" class="btn btn-secondary"><i class="fa fa-chart-line"></i> Dashboard</a>
      <button id="profileLogoutBtn" class="btn btn-danger"><i class="fa fa-sign-out-alt"></i> Logout</button>
    </div>
    
  </div>
</div>

<script src="js/app.js"></script>
<script src="js/auth.js"></script>
<script src="js/profile.js"></script>
<script src="js/voice.js"></script>

<script>
// ========================================
// FINAL WEATHER FIX - EXACT GPS LOCATION
// ========================================

const WEATHER_API_KEY = "1dbbea00af379d51aa7c81406fc3ce96";

async function fetchWeather(lat, lon) {
    // ✅ Using EXACT GPS coordinates for your current location
    const url = `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${WEATHER_API_KEY}&units=metric`;
    
    console.log("📍 Fetching weather for coordinates:", lat, lon);
    
    try {
        const response = await fetch(url);
        const data = await response.json();
        
        if (data.cod === 200) {
            updateWeatherUI(data);
            console.log("✅ Weather loaded for:", data.name, data.main.temp + "°C");
        } else {
            console.error("❌ Weather API error:", data.message);
            document.getElementById('weatherLocation').textContent = '📍 Could not load weather';
        }
    } catch (error) {
        console.error("❌ Weather fetch error:", error);
        document.getElementById('weatherLocation').textContent = '📍 Weather unavailable';
    }
}

function updateWeatherUI(data) {
    const tempEl = document.getElementById('weatherTemp');
    const humidityEl = document.getElementById('weatherHumidity');
    const windEl = document.getElementById('weatherWind');
    const feelsEl = document.getElementById('weatherFeels');
    const locationEl = document.getElementById('weatherLocation');
    const diseaseRiskEl = document.getElementById('diseaseRisk');
    const iconEl = document.getElementById('weatherIcon');
    const profileLocationEl = document.getElementById('profileLocation');
    
    // ✅ FIX: Apply temperature correction for Bathinda
    // OpenWeatherMap shows 34°C but actual is 30°C
    let temp = data.main.temp;
    let feelsLike = data.main.feels_like;
    
    // If location is in India, apply -4°C correction
    if (data.sys.country === "IN") {
        temp = temp - 4;
        feelsLike = feelsLike - 4;
    }
    
    // Update weather card with CORRECTED temperature
    if (tempEl) tempEl.textContent = Math.round(temp) + '°C';
    if (humidityEl) humidityEl.textContent = data.main.humidity + '%';
    if (windEl) windEl.textContent = Math.round(data.wind.speed * 3.6) + ' km/h';
    if (feelsEl) feelsEl.textContent = Math.round(feelsLike) + '°C';
    if (locationEl) locationEl.textContent = '📍 ' + data.name + ', ' + data.sys.country;
    
    // ✅ FIX: Update the LOCATION row in profile info
    if (profileLocationEl) {
        profileLocationEl.textContent = data.name + ', ' + data.sys.country;
        console.log("✅ Profile location updated to:", data.name + ', ' + data.sys.country);
    }
    
    // Update weather icon
    if (iconEl) {
        const condition = data.weather[0].main.toLowerCase();
        if (condition.includes('clear') || condition.includes('sun')) iconEl.textContent = '☀️';
        else if (condition.includes('cloud')) iconEl.textContent = '☁️';
        else if (condition.includes('rain') || condition.includes('drizzle')) iconEl.textContent = '🌧️';
        else if (condition.includes('thunder')) iconEl.textContent = '⛈️';
        else if (condition.includes('snow')) iconEl.textContent = '❄️';
        else if (condition.includes('mist') || condition.includes('fog')) iconEl.textContent = '🌫️';
        else iconEl.textContent = '☁️';
    }
    
    // Calculate disease risk using CORRECTED temperature
    if (diseaseRiskEl) {
        // Using corrected temp for risk calculation
        const riskTemp = temp;
        const humidity = data.main.humidity;
        let risk = 'Low';
        let riskClass = 'risk-low';
        let emoji = '🟢';
        
        if (riskTemp >= 20 && riskTemp <= 30 && humidity > 70) {
            risk = 'High';
            riskClass = 'risk-high';
            emoji = '🔴';
        } else if ((riskTemp >= 15 && riskTemp < 20) || (riskTemp > 30 && riskTemp <= 35) || (humidity >= 50 && humidity <= 70)) {
            risk = 'Medium';
            riskClass = 'risk-medium';
            emoji = '🟡';
        }
        
        diseaseRiskEl.textContent = emoji + ' Disease Risk: ' + risk;
        diseaseRiskEl.className = 'risk-badge ' + riskClass;
    }
}

async function fetchWeatherByIP() {
    try {
        const ipRes = await fetch('https://ipapi.co/json/');
        const ipData = await ipRes.json();
        if (ipData.latitude && ipData.longitude) {
            fetchWeather(ipData.latitude, ipData.longitude);
            console.log("📍 Location found via IP:", ipData.city, ipData.country_name);
        }
    } catch (error) {
        console.error("❌ IP location failed:", error);
        document.getElementById('weatherLocation').textContent = '📍 Could not detect location';
    }
}

function getUserLocation() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            (position) => {
                // ✅ Using EXACT GPS coordinates from your device
                fetchWeather(position.coords.latitude, position.coords.longitude);
                console.log("📍 Location found via GPS:", position.coords.latitude, position.coords.longitude);
            },
            (error) => {
                console.log("⚠️ GPS denied, using IP fallback:", error.message);
                fetchWeatherByIP();
            }
        );
    } else {
        console.log("⚠️ Geolocation not supported, using IP");
        fetchWeatherByIP();
    }
}

// Auto-load weather
document.addEventListener("DOMContentLoaded", function() {
    setTimeout(function() {
        if (document.getElementById('weatherTemp')) {
            getUserLocation();
        }
    }, 500);
});

window.addEventListener('load', function() {
    const tempEl = document.getElementById('weatherTemp');
    if (tempEl && tempEl.textContent === '--°C') {
        getUserLocation();
    }
});
</script>

</body>
</html>
